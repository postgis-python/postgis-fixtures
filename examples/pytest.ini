; Standalone pytest config for the example project.
;
; Having its own ini file makes `pytest examples` treat this directory as the
; rootdir, which is what lets conftest.py declare `pytest_plugins`.
[pytest]
testpaths = .
markers =
    postgis: test requires a live PostGIS database provided by postgis-fixtures
postgis_row_counts =
    cities = 2000
    service_areas = 120
