; pytest configuration for the postgis-fixtures repository itself.
; This is config only — the package is not distributed, it is cloned.
[pytest]
testpaths = tests
norecursedirs = .venv examples .git
; The package is cloned, not installed, so the repository root has to be on
; sys.path. Without this, `python -m pytest` works (it adds the working
; directory) but a plain `pytest` does not — which is also what a consuming
; project hits before it sets PYTHONPATH.
pythonpath = .
addopts = -ra --strict-markers
markers =
    postgis: test requires a live PostGIS database provided by postgis-fixtures
filterwarnings =
    error
    ignore::pytest.PytestAssertRewriteWarning
