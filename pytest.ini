; pytest configuration for the postgis-fixtures repository itself.
; This is config only — the package is not distributed, it is cloned.
[pytest]
testpaths = tests
norecursedirs = .venv examples .git
addopts = -ra --strict-markers
markers =
    postgis: test requires a live PostGIS database provided by postgis-fixtures
filterwarnings =
    error
    ignore::pytest.PytestAssertRewriteWarning
